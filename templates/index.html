<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XR2KZE3GQF"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-BX7PQR086N');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
    <title>KenyaCooks</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="shortcut icon" type="image/png" href="/static/icons/icon-512.png">
</head>
<body>
    <div class="app-container">
        <div class="card">
            <h1>What's for Supper?</h1>
            <p id="idea">Tap below to get an idea!</p>
            
            <div id="extraInfo" style="display: none; text-align: left; margin: 15px 0;">
                <div style="background: rgba(0,0,0,0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px;">
                    <p style="font-size: 0.85rem; font-weight: bold; margin-bottom: 5px;">Preparation Steps:</p>
                    <p id="recipeDisplay" style="font-size: 0.9rem; line-height: 1.4;"></p>
                </div>
                <div style="color: var(--logo-green); font-weight: 600; font-size: 0.9rem; border-left: 3px solid var(--logo-green); padding-left: 10px;">
                    <p style="margin-bottom: 2px;">Nutritional Tip:</p>
                    <span id="healthDisplay"></span>
                </div>
            </div>

            <div class="timer-container" style="margin: 20px 0; border-top: 1px solid #eee; padding-top: 15px;">
                <p style="font-size: 0.8rem; margin-bottom: 8px; color: var(--deep-text); opacity: 0.8;">Kitchen Timer</p>
                <div style="display: flex; gap: 8px; justify-content: center; align-items: center;">
                    <button onclick="startTimer(20)" style="padding: 8px 12px; font-size: 0.75rem; width: auto;">20m</button>
                    <button onclick="startTimer(45)" style="padding: 8px 12px; font-size: 0.75rem; width: auto;">45m</button>
                    <span id="timerDisplay" style="font-family: 'Courier New', Courier, monospace; font-weight: bold; margin-left: 15px; font-size: 1.2rem;">00:00</span>
                </div>
            </div>

            <div class="btn-group">
                <button class="generate-btn" onclick="getIdea()">Generate Idea</button>
                <button id="saveBtn" class="save-btn" onclick="saveFavorite()" style="display: none;">
                    Save to Favorites
                </button>
                <button id="shareBtn" class="share-btn" onclick="shareToWhatsApp()" style="display: none;">
                    Share via WhatsApp
                </button>
            </div>
        </div>

        <div class="card favorites-card">
            <h3>My Favorites</h3>
            <ul id="favoritesList">
                </ul>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
