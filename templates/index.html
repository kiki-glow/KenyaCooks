<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XR2KZE3GQF"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XR2KZE3GQF');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
    <title>KenyaCooks | Local Meal Ideas & Kitchen Timer</title>
    <meta name="description" content="Stuck on what to cook? Generate Kenyan meal ideas, follow recipes, and use our kitchen timer.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kenyacooks.onrender.com">
    <meta property="og:title" content="KenyaCooks - What's Cooking?">
    <meta property="og:description" content="Generate healthy, balanced Kenyan meal ideas instantly.">
    <meta property="og:image" content="/static/icons/icon-512.png">

    <link rel="stylesheet" href="/static/style.css">
    <link rel="shortcut icon" type="image/png" href="/static/icons/icon-512.png">
</head>
<body>
    <main class="app-container">
        <section class="card" aria-labelledby="main-title">
            <div class="wordmark">
                <img src="/static/icons/icon-512.png" alt="KenyaCooks logo" class="brand-logo" onerror="this.hidden=true">
                <h1 id="main-title">Kenya<span class="accent">Cooks</span></h1>
            </div>
            <p class="tagline">What's cooking today?</p>

            <div id="resultRegion" aria-live="polite" aria-atomic="true">
                <p id="idea">Tap below to get an idea.</p>

                <div id="extraInfo" class="extra-info" aria-hidden="true">
                    <div class="skeleton-block" id="skeletonBlock" aria-hidden="true">
                        <div class="skel-line skel-wide"></div>
                        <div class="skel-line skel-medium"></div>
                        <div class="skel-line skel-narrow"></div>
                    </div>

                    <div class="recipe-block" id="recipeBlock">
                        <p class="recipe-label">Preparation</p>
                        <ol id="recipeDisplay" class="steps-list"></ol>
                    </div>

                    <div class="health-block" id="healthBlock">
                        <div>
                            <p class="health-label">Nutritional tip</p>
                            <span id="healthDisplay"></span>
                        </div>
                    </div>

                    <div class="error-block" id="errorBlock" role="alert">
                        <span class="error-icon" aria-hidden="true">!</span>
                        <div class="error-body">
                            <p class="error-title">Couldn't fetch a meal idea</p>
                            <p id="errorMsg" class="error-msg"></p>
                        </div>
                        <button class="retry-btn" onclick="getIdea()">Try again</button>
                    </div>
                </div>
            </div>

            <div class="timer-strip" id="timerStrip" aria-live="polite">
                <div>
                    <p class="timer-label">Kitchen Timer</p>
                    <p id="activeStepLabel" class="active-step-label">No active step</p>
                </div>
                <span id="timerDisplay" class="timer-display">00:00</span>
            </div>

            <div class="btn-group">
                <button class="generate-btn" id="generateBtn" onclick="getIdea()">
                    <span class="btn-spinner" id="btnSpinner" aria-hidden="true"></span>
                    <span id="btnLabel">Generate Idea</span>
                </button>
                <div class="btn-row" id="secondaryBtns" style="display:none;">
                    <button id="saveBtn" class="save-btn" onclick="saveFavorite()">Save</button>
                    <button id="shareBtn" class="share-btn" onclick="shareToWhatsApp()">Share</button>
                </div>
            </div>
        </section>

        <section class="card favorites-card" aria-labelledby="fav-title">
            <h3 id="fav-title">Saved</h3>
            <ul id="favoritesList"></ul>
        </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/static/script.js"></script>
</body>
</html>
